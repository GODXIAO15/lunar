name: 打包农历生日生成器EXE
on: push
jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: 配置Python3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 安装全部依赖库
        run: |
          python -m pip install customtkinter lunar-python pyinstaller -i https://pypi.tuna.tsinghua.edu.cn/simple
      - name: 执行打包命令
        run: |
          pyinstaller -w -F --hidden-import=lunar_python --hidden-import=customtkinter --name=农历生日生成器 lunar_alarm.py
      - name: 上传打包好的EXE文件
        uses: actions/upload-artifact@v4
        with:
          path: dist/*.exe
